    <div class="modal fade" id="permissionDetailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Chi tiết permission</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">ID</label>
                <input type="text" class="form-control" id="detailId" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Trạng thái</label>
                <input type="text" class="form-control" id="detailStatus" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Code</label>
                <input type="text" class="form-control" id="detailCode" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Module</label>
                <input type="text" class="form-control" id="detailModule" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Tên</label>
                <input type="text" class="form-control" id="detailName" readonly />
              </div>
              <div class="col-md-6">
                <label class="form-label">Mô tả</label>
                <input type="text" class="form-control" id="detailDescription" readonly />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
          </div>

    <script
      src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./adminlte/js/adminlte.js"></script>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const API_BASE = '/api/permissions';
        const PAGE_SIZE = 8;

        let currentPage = 0;
        let totalPages = 0;
        let totalElements = 0;
        let activeFilterMode = 0;
        let moduleFilter = '';
        let allPermissions = [];

        const tableBody = document.getElementById('permissionTableBody');
        const pagination = document.getElementById('pagination');
        const paginationInfo = document.getElementById('paginationInfo');
        const searchInput = document.getElementById('searchInput');
        const moduleSelect = document.getElementById('moduleSelect');
        const btnFilterModule = document.getElementById('btnFilterModule');

        const permissionModalEl = document.getElementById('permissionModal');
        const permissionModalTitle = document.getElementById('permissionModalTitle');
        const permissionIdInput = document.getElementById('permissionId');
        const permissionNameInput = document.getElementById('permissionName');
        const permissionCodeInput = document.getElementById('permissionCode');
        const permissionModuleInput = document.getElementById('permissionModule');
        const permissionDescriptionInput = document.getElementById('permissionDescription');
        const btnSavePermission = document.getElementById('btnSavePermission');
        const btnAdd = document.getElementById('btnAdd');
        const btnLoadActive = document.getElementById('btnLoadActive');

        const permissionDetailModalEl = document.getElementById('permissionDetailModal');
        const detailId = document.getElementById('detailId');
        const detailStatus = document.getElementById('detailStatus');
        const detailCode = document.getElementById('detailCode');
        const detailModule = document.getElementById('detailModule');
        const detailName = document.getElementById('detailName');
        const detailDescription = document.getElementById('detailDescription');

        var permissionModal = null;
        if (window.bootstrap && permissionModalEl) {
          permissionModal = new window.bootstrap.Modal(permissionModalEl);
        }
        var permissionDetailModal = null;
        if (window.bootstrap && permissionDetailModalEl) {
          permissionDetailModal = new window.bootstrap.Modal(permissionDetailModalEl);
        }

        function highlightText(text, term) {
          if (!term) return text;
          const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const re = new RegExp(escaped, 'ig');
          return text.replace(re, function (m) {
            return '<mark>' + m + '</mark>';
          });
        }

        function normalizeText(value) {
          return (value || '')
            .toString()
            .toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/đ/g, 'd')
            .replace(/Ð/g, 'd');
        }

        function getStatusLabel(permission) {
          if (!permission) return 'Không xác định';
          if (typeof permission.status === 'string' && permission.status.trim()) {
            return permission.status;
          }

          var isActive = getIsActive(permission);
          if (typeof isActive === 'boolean') {
            return isActive ? 'Hoạt động' : 'Đã khóa';
          }

          if (typeof permission.locked === 'boolean') {
            return permission.locked ? 'Đã khóa' : 'Hoạt động';
          }

          return 'Không xác định';
        }

        function getIsActive(permission) {
          if (!permission) return null;
          if (typeof permission.isActive === 'boolean') return permission.isActive;
          if (typeof permission.active === 'boolean') return permission.active;
          if (typeof permission.is_active === 'boolean') return permission.is_active;
          if (typeof permission.isActive === 'number') return permission.isActive === 1;
          if (typeof permission.active === 'number') return permission.active === 1;
          if (typeof permission.is_active === 'number') return permission.is_active === 1;
          return null;
        }

        function renderTable(permissions) {
          const term = searchInput.value.trim();
          tableBody.innerHTML = permissions
            .map(function (r) {
              const isActive = getIsActive(r);
              const statusBadge =
                typeof isActive === 'boolean'
                  ? isActive
                    ? '<span class="badge bg-success">Hoạt động</span>'
                    : '<span class="badge bg-secondary">Đã khóa</span>'
                  : '<span class="badge bg-secondary">Không xác định</span>';
              const lockAction =
                typeof isActive === 'boolean'
                  ? isActive
                    ? '<button class="btn btn-sm btn-outline-warning me-1" data-id="' +
                      r.id +
                      '" data-action="lock" title="Khóa">' +
                      '<i class="bi bi-lock"></i>' +
                      '</button>'
                    : '<button class="btn btn-sm btn-outline-success me-1" data-id="' +
                      r.id +
                      '" data-action="unlock" title="Mở khóa">' +
                      '<i class="bi bi-unlock"></i>' +
                      '</button>'
                  : '';
              return (
                '<tr class="permission-row" data-id="' +
                r.id +
                '">' +
                '<td>' +
                highlightText(r.code || '', term) +
                '</td>' +
                '<td>' +
                highlightText(r.module || '', term) +
                '</td>' +
                '<td>' +
                highlightText(r.name || '', term) +
                '</td>' +
                '<td>' +
                highlightText(r.description || '', term) +
                '</td>' +
                '<td>' +
                statusBadge +
                '</td>' +
                '<td class="text-end">' +
                lockAction +
                '<button class="btn btn-sm btn-outline-secondary me-1" data-id="' +
                r.id +
                '" data-action="edit">' +
                '<i class="bi bi-pencil"></i>' +
                '</button>' +
                '<button class="btn btn-sm btn-outline-danger" data-id="' +
                r.id +
                '" data-action="delete">' +
                '<i class="bi bi-trash"></i>' +
                '</button>' +
                '</td>' +
                '</tr>'
              );
            })
            .join('');

          const from = totalElements === 0 ? 0 : currentPage * PAGE_SIZE + 1;
          const to = Math.min((currentPage + 1) * PAGE_SIZE, totalElements);
          paginationInfo.textContent =
            'Hiển thị ' + from + '-' + to + ' trên tổng ' + totalElements + ' permissions';

          renderPagination();
        }

        function applyFilterAndRender() {
          const term = normalizeText(searchInput.value.trim());
          const filtered = allPermissions.filter(function (r) {
            if (moduleFilter) {
              const itemModule = normalizeText(r.module);
              const filterValue = normalizeText(moduleFilter);
              if (!itemModule || itemModule !== filterValue) return false;
            }
            if (!term) return true;
            const name = normalizeText(r.name);
            const description = normalizeText(r.description);
            const code = normalizeText(r.code);
            const module = normalizeText(r.module);
            return (
              name.includes(term) ||
              description.includes(term) ||
              code.includes(term) ||
              module.includes(term)
            );
          });

          totalElements = filtered.length;
          totalPages = totalElements === 0 ? 0 : Math.ceil(totalElements / PAGE_SIZE);
          if (currentPage >= totalPages) {
            currentPage = Math.max(0, totalPages - 1);
          }

          const start = currentPage * PAGE_SIZE;
          const pageItems = filtered.slice(start, start + PAGE_SIZE);
          renderTable(pageItems);
        }

        function renderPagination() {
          if (totalPages === 0) {
            pagination.innerHTML = '';
            return;
          }

          var html = '';
          html +=
            '<li class="page-item ' +
            (currentPage === 0 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage - 1) +
            '">&laquo;</a></li>';

          for (var i = 0; i < totalPages; i++) {
            html +=
              '<li class="page-item ' +
              (i === currentPage ? 'active' : '') +
              '"><a class="page-link" href="#" data-page="' +
              i +
              '">' +
              (i + 1) +
              '</a></li>';
          }

          html +=
            '<li class="page-item ' +
            (currentPage === totalPages - 1 ? 'disabled' : '') +
            '"><a class="page-link" href="#" data-page="' +
            (currentPage + 1) +
            '">&raquo;</a></li>';

          pagination.innerHTML = html;
        }

        pagination.addEventListener('click', function (e) {
          if (e.target.tagName !== 'A') return;
          e.preventDefault();
          const page = Number(e.target.getAttribute('data-page'));
          if (isNaN(page) || page === currentPage || page < 0 || page >= totalPages) return;
          currentPage = page;
          reloadPermissions();
        });
        searchInput.addEventListener('input', function () {
          currentPage = 0;
          applyFilterAndRender();
        });

        async function loadPermissions() {
          try {
            const res = await fetch(API_BASE);
            const data = await res.json();
            allPermissions = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi tải danh sách permissions', e);
          }
        }

        async function loadPermissionsActive(isActive) {
          try {
            const activeValue = typeof isActive === 'boolean' ? (isActive ? 'true' : 'false') : 'true';
            const params = new URLSearchParams({ isActive: activeValue });
            const res = await fetch(API_BASE + '?' + params.toString());
            const data = await res.json();
            allPermissions = Array.isArray(data) ? data : [];
            applyFilterAndRender();
          } catch (e) {
            console.error('Lỗi lọc permissions theo trạng thái', e);
          }
        }

        function reloadPermissions() {
          if (activeFilterMode === 1) {
            return loadPermissionsActive(true);
          }
          if (activeFilterMode === 2) {
            return loadPermissionsActive(false);
          }
          return loadPermissions();
        }

        async function loadModules() {
          if (!moduleSelect) return;
          try {
            const res = await fetch(API_BASE + '/modules');
            const data = await res.json();
            const modules = Array.isArray(data) ? data : [];
            const options = ['<option value="">Tất cả module</option>']
              .concat(
                modules.map(function (m) {
                  const value = m == null ? '' : String(m);
                  return '<option value="' + value.replace(/"/g, '&quot;') + '">' + value + '</option>';
                })
              )
              .join('');
            moduleSelect.innerHTML = options;
          } catch (e) {
            console.error('Lỗi tải danh sách module', e);
          }
        }

        let currentEditingPermission = null;

        function openAddModal() {
          if (!permissionModal) return;
          currentEditingPermission = null;
          permissionIdInput.value = '';
          permissionNameInput.value = '';
          permissionCodeInput.value = '';
          permissionModuleInput.value = '';
          permissionDescriptionInput.value = '';
          permissionModalTitle.textContent = 'Thêm permission';
          btnSavePermission.dataset.mode = 'create';
          permissionModal.show();
        }

        function openEditModal(permission) {
          if (!permissionModal) return;
          currentEditingPermission = permission || {};
          permissionIdInput.value = permission.id;
          permissionNameInput.value = permission.name || '';
          permissionCodeInput.value = permission.code || '';
          permissionModuleInput.value = permission.module || '';
          permissionDescriptionInput.value = permission.description || '';
          permissionModalTitle.textContent = 'Cập nhật permission';
          btnSavePermission.dataset.mode = 'update';
          permissionModal.show();
        }

        btnAdd.addEventListener('click', function () {
          openAddModal();
        });

        if (btnLoadActive) {
          btnLoadActive.addEventListener('click', function () {
            activeFilterMode = (activeFilterMode + 1) % 3;
            if (activeFilterMode === 1) {
              btnLoadActive.innerHTML = '<i class="bi bi-check-circle me-1"></i> Đang hoạt động';
              loadPermissionsActive(true);
            } else if (activeFilterMode === 2) {
              btnLoadActive.innerHTML = '<i class="bi bi-slash-circle me-1"></i> Đã khóa';
              loadPermissionsActive(false);
            } else {
              btnLoadActive.innerHTML = '<i class="bi bi-filter-circle me-1"></i> Tất cả';
              loadPermissions();
            }
          });
          btnLoadActive.innerHTML = '<i class="bi bi-filter-circle me-1"></i> Tất cả';
        }

        if (btnFilterModule) {
          btnFilterModule.addEventListener('click', function () {
            moduleFilter = moduleSelect ? moduleSelect.value.trim() : '';
            currentPage = 0;
            applyFilterAndRender();
          });
        }

        if (moduleSelect) {
          moduleSelect.addEventListener('change', function () {
            // Cho phép đổi nhanh khi chọn module
            moduleFilter = moduleSelect.value.trim();
            currentPage = 0;
            applyFilterAndRender();
          });
        }

        tableBody.addEventListener('click', function (e) {
          const btn = e.target.closest('button[data-action]');
          if (btn) {
            const id = btn.getAttribute('data-id');
            const action = btn.getAttribute('data-action');
            if (action === 'edit') {
              // Lấy chi tiết permission từ API để luôn dữ liệu mới nhất
              fetch(API_BASE + '/' + id)
                .then(function (res) {
                  return res.json();
                })
                .then(function (permission) {
                  openEditModal(permission || {});
                })
                .catch(function () {
                  alert('Không tải được thông tin permission.');
                });
            } else if (action === 'lock') {
              lockPermission(id);
            } else if (action === 'unlock') {
              unlockPermission(id);
            } else if (action === 'delete') {
              if (confirm('Bạn có chắc chắn muốn xóa permission này?')) {
                deletePermission(id);
              }
            }
            return;
          }

          const row = e.target.closest('tr.permission-row');
          if (!row) return;
          const id = row.getAttribute('data-id');
          if (!id) return;
          fetch(API_BASE + '/' + id)
            .then(function (res) {
              return res.json();
            })
            .then(function (permission) {
              detailId.value = permission.id || '';
              detailStatus.value = getStatusLabel(permission);
              detailCode.value = permission.code || '';
              detailModule.value = permission.module || '';
              detailName.value = permission.name || '';
              detailDescription.value = permission.description || '';
              if (permissionDetailModal) {
                permissionDetailModal.show();
              }
            })
            .catch(function () {
              alert('Không tải được thông tin permission.');
            });
        });

        async function savePermission() {
          const mode = btnSavePermission.dataset.mode;
          const name = permissionNameInput.value.trim();
          const code = permissionCodeInput.value.trim();
          const module = permissionModuleInput.value.trim();
          const description = permissionDescriptionInput.value.trim();

          if (!name || !code) {
            alert('Vui lòng nhập tên và code permission.');
            return;
          }

          const isUpdate = mode === 'update';
          const id = permissionIdInput.value;

          const payload = {
            code: code,
            module: module,
            name: name,
            description: description,
          };

          const url = isUpdate ? API_BASE + '/' + id : API_BASE;
          const method = isUpdate ? 'PUT' : 'POST';

          try {
            const res = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            if (permissionModal) {
              permissionModal.hide();
            }
            await reloadPermissions();
          } catch (e) {
            console.error('Lỗi lưu permission', e);
            alert('Có lỗi xảy ra khi lưu permission.');
          }
        }

        btnSavePermission.addEventListener('click', function () {
          savePermission();
        });

        async function deletePermission(id) {
          try {
            const res = await fetch(API_BASE + '/' + id, { method: 'DELETE' });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            await reloadPermissions();
          } catch (e) {
            console.error('Lỗi xóa permission', e);
            alert('Có lỗi xảy ra khi xóa permission.');
          }
        }

        async function lockPermission(id) {
          try {
            const res = await fetch(API_BASE + '/' + id + '/lock', { method: 'PUT' });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            await reloadPermissions();
          } catch (e) {
            console.error('Lỗi khóa permission', e);
            alert('Có lỗi xảy ra khi khóa permission.');
          }
        }

        async function unlockPermission(id) {
          try {
            const res = await fetch(API_BASE + '/' + id + '/unlock', { method: 'PUT' });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            await reloadPermissions();
          } catch (e) {
            console.error('Lỗi mở khóa permission', e);
            alert('Có lỗi xảy ra khi mở khóa permission.');
          }
        }

        const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
        const Default = {
          scrollbarTheme: 'os-theme-light',
          scrollbarAutoHide: 'leave',
          scrollbarClickScroll: true,
        };
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (sidebarWrapper && window.OverlayScrollbarsGlobal && window.OverlayScrollbarsGlobal.OverlayScrollbars) {
          window.OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
            scrollbars: {
              theme: Default.scrollbarTheme,
              autoHide: Default.scrollbarAutoHide,
              clickScroll: Default.scrollbarClickScroll,
            },
          });
        }

        loadModules();
        reloadPermissions();
      });
    </script>
  </body>
</html>
